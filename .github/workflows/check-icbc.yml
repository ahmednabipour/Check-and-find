name: Check ICBC appointment slots

on:
  schedule:
    # Hourly backup only, in case the external trigger (see README,
    # "External trigger setup") is ever down. The real cadence comes
    # from repository_dispatch, called by a free external cron service
    # every 5 minutes, since GitHub's own schedule trigger is unreliable
    # at that frequency.
    - cron: '0 * * * *'
  repository_dispatch:
    types: [check-icbc]
  workflow_dispatch: {}  # lets you trigger a manual run from the Actions tab

permissions:
  contents: write  # needed to commit the last-run timestamp back to the repo

concurrency:
  group: icbc-checker
  cancel-in-progress: false  # never run two checks at once

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - id: decide
        name: Decide whether enough time has passed since the last real run
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 - << 'PYEOF'
          import datetime, os
          from zoneinfo import ZoneInfo

          event_name = os.environ.get("EVENT_NAME", "")
          local_now = datetime.datetime.now(ZoneInfo("America/Vancouver"))
          in_blackout = datetime.time(0, 30) <= local_now.time() < datetime.time(5, 30)

          STATE_FILE = ".state/last_run.txt"
          MIN_GAP_MINUTES = 15

          if event_name == "workflow_dispatch":
              # Manual runs always execute for real, no point gating a
              # run you explicitly asked for, even during the blackout.
              should_run = True
              print("Manually triggered, running for real.")
          elif in_blackout:
              should_run = False
              print(f"In overnight blackout window (local time {local_now.strftime('%H:%M')}), skipping.")
          elif not os.path.exists(STATE_FILE):
              should_run = True
              print("No last-run record found, this is the first run.")
          else:
              with open(STATE_FILE) as f:
                  last_run = datetime.datetime.fromisoformat(f.read().strip())
              now_utc = datetime.datetime.now(datetime.timezone.utc)
              elapsed_minutes = (now_utc - last_run).total_seconds() / 60
              should_run = elapsed_minutes >= MIN_GAP_MINUTES
              print(f"Last real run: {last_run.isoformat()} ({elapsed_minutes:.1f} min ago). should_run={should_run}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"run={'true' if should_run else 'false'}\n")
          PYEOF

      - name: Skip notice
        if: steps.decide.outputs.run != 'true'
        run: echo "it was a skip run"

      - if: steps.decide.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.decide.outputs.run == 'true'
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run checker
        if: steps.decide.outputs.run == 'true'
        env:
          ICBC_LASTNAME: ${{ secrets.ICBC_LASTNAME }}
          ICBC_LICENSE: ${{ secrets.ICBC_LICENSE }}
          ICBC_KEYWORD: ${{ secrets.ICBC_KEYWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: sahmednabipour@gmail.com
        run: python icbc_checker.py

      - name: Record this run's timestamp
        if: always() && steps.decide.outputs.run == 'true'
        run: |
          mkdir -p .state
          date -u +"%Y-%m-%dT%H:%M:%S+00:00" > .state/last_run.txt
          git config user.name "icbc-checker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add .state/last_run.txt
          git commit -m "chore: record last run timestamp" || echo "Nothing to commit"
          git pull --rebase
          git push

      - name: Upload debug screenshots
        if: steps.decide.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_*.png
          if-no-files-found: ignore
          retention-days: 3
