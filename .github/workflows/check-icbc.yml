name: Check ICBC appointment slots

on:
  schedule:
    # Fires every 5 minutes, but the "decide" step below only lets ONE
    # of the 6 slots in each 30-minute window (:00-:25 or :30-:55)
    # actually run the real check. Which slot gets picked is randomized
    # per window, so there's no fixed pattern, while still totalling
    # 48 real checks/day. The 5 "skipped" runs per window exit in a
    # few seconds and barely cost any Actions minutes.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}  # lets you trigger a manual run from the Actions tab

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - id: decide
        name: Decide whether this 5-minute slot is the chosen one
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 - << 'PYEOF'
          import random, datetime, os
          from zoneinfo import ZoneInfo

          event_name = os.environ.get("EVENT_NAME", "")
          local_now = datetime.datetime.now(ZoneInfo("America/Vancouver"))
          in_blackout = datetime.time(0, 30) <= local_now.time() < datetime.time(5, 30)

          if event_name == "workflow_dispatch":
              # Manual runs always execute for real, no point gating a
              # run you explicitly asked for, even during the blackout.
              should_run = "true"
              print("Manually triggered, running for real.")
          elif in_blackout:
              should_run = "false"
              print(f"In overnight blackout window (local time {local_now.strftime('%H:%M')}), skipping.")
          else:
              now = datetime.datetime.utcnow()
              half_hour_start = 0 if now.minute < 30 else 30
              seed = f"{now.date()}-{now.hour}-{half_hour_start}"

              rng = random.Random(seed)
              chosen_slot = rng.randrange(6)  # one of 0..5, i.e. +0/5/10/15/20/25 min
              current_slot = (now.minute - half_hour_start) // 5

              should_run = "true" if current_slot == chosen_slot else "false"
              print(f"window={seed} chosen_slot={chosen_slot} current_slot={current_slot} should_run={should_run}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"run={should_run}\n")
          PYEOF

      - name: Skip notice
        if: steps.decide.outputs.run != 'true'
        run: echo "it was a skip run"

      - if: steps.decide.outputs.run == 'true'
        uses: actions/checkout@v4

      - if: steps.decide.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.decide.outputs.run == 'true'
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run checker
        if: steps.decide.outputs.run == 'true'
        env:
          ICBC_LASTNAME: ${{ secrets.ICBC_LASTNAME }}
          ICBC_LICENSE: ${{ secrets.ICBC_LICENSE }}
          ICBC_KEYWORD: ${{ secrets.ICBC_KEYWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: sahmednabipour@gmail.com
        run: python icbc_checker.py

      - name: Upload debug screenshots
        if: steps.decide.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_*.png
          if-no-files-found: ignore
          retention-days: 3
