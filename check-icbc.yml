name: Check ICBC appointment slots

on:
  schedule:
    # Every hour, on the hour. Adjust if you want more/less frequent
    # checks, but keep an eye on your GitHub Actions free-tier minutes
    # if this repo is private (2,000 min/month free). Public repos get
    # unlimited minutes.
    - cron: '0 * * * *'
  workflow_dispatch: {}  # lets you trigger a manual run from the Actions tab

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run checker
        env:
          ICBC_LASTNAME: ${{ secrets.ICBC_LASTNAME }}
          ICBC_LICENSE: ${{ secrets.ICBC_LICENSE }}
          ICBC_KEYWORD: ${{ secrets.ICBC_KEYWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: sahmednabipour@gmail.com
        run: python icbc_checker.py
